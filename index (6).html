<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de Faixa Etária - 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Classificador de Idade</h1>
        
        <div class="output-container">
            <span class="age-label">Idade Selecionada:</span>
            <div class="counter-container">
                <button type="button" class="btn-counter" id="btn-minus">–</button>
                <span id="age-display">12</span>
                <button type="button" class="btn-counter" id="btn-plus">+</button>
            </div>
        </div>

        <div class="strength-container">
            <div class="strength-header">
                <span class="strength-label">CLASSIFICAÇÃO:</span>
                <span id="classification-text" class="strength-state">Adolescente</span>
            </div>
            <div class="strength-bar-bg">
                <div id="strength-bar-fill" class="strength-bar-fill"></div>
            </div>
        </div>

        <p class="info-text">Altere a idade nos botões acima para ver a categoria mudar dinamicamente.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
