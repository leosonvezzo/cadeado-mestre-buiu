<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Avançado - 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Gerador de Senhas</h1>
        
        <div class="output-container">
            <span id="password-display">Clique em Gerar...</span>
            <button class="btn-copy" id="copy-btn">Copiar</button>
        </div>

        <div class="form-group">
            <label for="length">Quantidade de caracteres:</label>
            <input type="number" id="length" min="4" max="32" value="12">
        </div>

        <div class="form-group">
            <label for="uppercase">Incluir Letras Maiúsculas</label>
            <input type="checkbox" id="uppercase" checked>
        </div>

        <div class="form-group">
            <label for="numbers">Incluir Números</label>
            <input type="checkbox" id="numbers" checked>
        </div>

        <div class="form-group">
            <label for="symbols">Incluir Símbolos Especiais</label>
            <input type="checkbox" id="symbols" checked>
        </div>

        <div class="form-group">
            <label for="no-repeat">Evitar Caracteres Repetidos</label>
            <input type="checkbox" id="no-repeat">
        </div>

        <div class="form-group">
            <label for="start-letter">Começar com Letra</label>
            <input type="checkbox" id="start-letter">
        </div>

        <div class="form-group">
            <label for="spaces">Incluir Espaços em Branco</label>
            <input type="checkbox" id="spaces">
        </div>

        <button class="btn-generate" id="generate-btn">Gerar Senha Nova</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
